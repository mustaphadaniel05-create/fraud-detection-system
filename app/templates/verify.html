<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Identity Verification</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = { darkMode: 'class' }
</script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
.face-box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:65%;
    height:70%;
    border:3px solid #22c55e;
    border-radius:12px;
    pointer-events:none;
}
.scan-line{
    position:absolute;
    width:100%;
    height:3px;
    background:#22c55e;
    animation:scan 2s linear infinite;
}
@keyframes scan{
    0%{top:0%}
    100%{top:100%}
}
.loading-spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid #fff;
    border-radius: 50%;
    border-top-color: transparent;
    animation: spin 0.6s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
}
@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen flex items-center justify-center px-4">

<button class="theme-toggle fixed top-5 right-5 text-xl bg-white dark:bg-gray-800 p-2 rounded shadow">🌙</button>

<div class="bg-white dark:bg-gray-800 shadow-lg rounded-xl w-full max-w-xl p-8">
    <div class="text-center mb-6">
        <h2 class="text-2xl font-semibold text-gray-800 dark:text-white">Identity Verification</h2>
        <p class="text-gray-500 dark:text-gray-300 text-sm mt-1">Position your face inside the frame and blink once</p>
    </div>

    <input type="email" id="email" placeholder="Your enrolled email address" autocomplete="email" required
           class="w-full border rounded-lg px-3 py-2 mb-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-gray-700 dark:text-white">
    <div id="email-help" class="text-sm mb-4"></div>

    <div class="relative flex justify-center mb-6">
        <video id="video" autoplay playsinline muted class="rounded-lg border shadow" width="420" height="320"></video>
        <div class="face-box"><div class="scan-line"></div></div>
    </div>

    <button id="verifyBtn" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50 mb-3" disabled>Start Verification</button>
    <button id="retryBtn" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 mb-3" style="display:none;">Retry Verification</button>

    <!-- Progress bar -->
    <div id="progress-bar-wrap" class="w-full bg-gray-200 dark:bg-gray-700 rounded h-2 mb-4 hidden">
        <div id="progress-bar" class="bg-indigo-600 h-2 rounded w-0 transition-all duration-100"></div>
    </div>
    <p id="result" class="text-center text-sm"></p>
</div>

<canvas id="canvas" style="display:none;" width="640" height="480"></canvas>

<script>
/* Theme toggle */
(function() {
    const themeToggle = document.querySelector(".theme-toggle");
    const savedTheme = localStorage.getItem("theme");
    if(savedTheme === "dark") {
        document.documentElement.classList.add("dark");
        if(themeToggle) themeToggle.textContent = "☀️";
    } else {
        document.documentElement.classList.remove("dark");
        if(themeToggle) themeToggle.textContent = "🌙";
    }
    if(themeToggle) {
        themeToggle.onclick = function() {
            document.documentElement.classList.toggle("dark");
            const isDark = document.documentElement.classList.contains("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            themeToggle.textContent = isDark ? "☀️" : "🌙";
        };
    }
})();

(async function() {
    "use strict";

    // Capture settings
    const FRAME_COUNT    = 10;
    const FRAME_INTERVAL = 100;
    const JPEG_QUALITY   = 0.70;

    // Progress bar animation duration (milliseconds)
    const PROGRESS_DURATION = 2500;   // 2 seconds – adjust to your backend speed

    const emailInput   = document.getElementById("email");
    const emailHelp    = document.getElementById("email-help");
    const verifyBtn    = document.getElementById("verifyBtn");
    const retryBtn     = document.getElementById("retryBtn");
    const resultEl     = document.getElementById("result");
    const progressWrap = document.getElementById("progress-bar-wrap");
    const progressBar  = document.getElementById("progress-bar");
    const video        = document.getElementById("video");
    const canvas       = document.getElementById("canvas");
    const ctx          = canvas.getContext("2d");

    let stream = null;
    let isCapturing = false;
    let progressInterval = null;

    function validateEmail() {
        const value = emailInput.value.trim().toLowerCase();
        emailHelp.textContent = "";
        verifyBtn.disabled = true;
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!value) {
            emailHelp.textContent = "Email is required";
            emailHelp.className = "text-red-500 text-sm";
            return false;
        }
        if (!emailRegex.test(value)) {
            emailHelp.textContent = "Enter a valid email";
            emailHelp.className = "text-red-500 text-sm";
            return false;
        }
        emailHelp.textContent = "Email looks good";
        emailHelp.className = "text-green-600 text-sm";
        verifyBtn.disabled = false;
        return true;
    }
    emailInput.addEventListener("input", validateEmail);

    function setResult(text, cls = "") {
        resultEl.innerHTML = text;
        resultEl.className = "text-center text-sm " + cls;
    }

    function setButtonLoading(isLoading) {
        if (isLoading) {
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<span class="loading-spinner"></span> Processing...';
        } else {
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = 'Start Verification';
        }
    }

    function showRetryButton() {
        verifyBtn.style.display = "none";
        retryBtn.style.display = "block";
    }

    function hideButtons() {
        verifyBtn.style.display = "none";
        retryBtn.style.display = "none";
    }

    // Progress bar animation over fixed duration
    function startProgressBar() {
        progressWrap.classList.remove("hidden");
        progressBar.style.width = "0%";
        const startTime = Date.now();
        if (progressInterval) clearInterval(progressInterval);
        progressInterval = setInterval(() => {
            const elapsed = Date.now() - startTime;
            const percent = Math.min(100, (elapsed / PROGRESS_DURATION) * 100);
            progressBar.style.width = `${percent}%`;
            if (percent >= 100) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
        }, 20);
    }

    function stopProgressBar() {
        if (progressInterval) {
            clearInterval(progressInterval);
            progressInterval = null;
        }
        progressWrap.classList.add("hidden");
        progressBar.style.width = "0%";
    }

    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }
            });
            video.srcObject = stream;
            await new Promise(r => video.onloadedmetadata = r);
            validateEmail();
        } catch (err) {
            setResult("Camera access denied.", "text-red-600");
        }
    }

    async function captureFrames() {
        if (isCapturing) return [];
        isCapturing = true;
        const frames = [];
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        for (let i = 0; i < FRAME_COUNT; i++) {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = canvas.toDataURL("image/jpeg", JPEG_QUALITY);
            frames.push(imageData.split(",")[1]);
            if (i < FRAME_COUNT - 1) {
                await new Promise(resolve => setTimeout(resolve, FRAME_INTERVAL));
            }
        }
        isCapturing = false;
        return frames;
    }

    async function runVerification() {
        if (!validateEmail()) {
            setResult("Enter a valid email first", "text-red-600");
            return;
        }
        if (isCapturing) {
            setResult("Already capturing, please wait...", "text-yellow-600");
            return;
        }

        setButtonLoading(true);
        setResult("Capturing frames...", "text-gray-600");
        startProgressBar();   // start smooth animation

        try {
            const frames = await captureFrames();
            if (frames.length === 0) throw new Error("No frames captured");

            setResult("Analyzing identity & liveness...", "text-gray-600");
            // Keep progress bar visible while backend works
            const res = await fetch("/api/verify", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    email: emailInput.value.trim(),
                    frames: frames
                })
            });
            const data = await res.json();
            stopProgressBar();   // finish animation
            displayResult(data);
        } catch (err) {
            console.error("Verification error:", err);
            stopProgressBar();
            setResult("Network error - please try again", "text-red-600");
            showRetryButton();
        } finally {
            setButtonLoading(false);
        }
    }

    function displayResult(data) {
        const s = (data.status || "ERROR").toUpperCase();
        const similarity = data.similarity || 0;
        const risk_score = data.risk_score || "N/A";
        const reason = data.reason || "Verification failed";
        const face_width = data.face_width_percentage;
        let resultHtml = "";
        if (["VERIFIED", "SUCCESS", "LIVE", "APPROVED"].includes(s)) {
            resultHtml = `✓ Identity verified<br>Similarity: ${(similarity * 100).toFixed(1)}%<br>Risk Level: ${risk_score}`;
            if (face_width) resultHtml += `<br><span class="text-xs text-gray-500">Face size: ${face_width}%</span>`;
            setResult(resultHtml, "text-green-600");
            hideButtons();
        } else if (s === "REQUIRES_ACTIVE") {
            setResult("Additional liveness challenge required<br>Redirecting...", "text-yellow-600");
            setTimeout(() => {
                const email = encodeURIComponent(emailInput.value.trim());
                location.href = `/api/active-challenge?email=${email}`;
            }, 2000);
        } else {
            resultHtml = `✗ ${reason}`;
            if (face_width && face_width < 25) resultHtml += `<br><span class="text-xs text-yellow-500">Tip: Move closer to camera</span>`;
            setResult(resultHtml, "text-red-600");
            showRetryButton();
        }
    }

    verifyBtn.addEventListener("click", runVerification);
    retryBtn.addEventListener("click", runVerification);
    startCamera();

    window.addEventListener("beforeunload", () => {
        if (stream) stream.getTracks().forEach(t => t.stop());
    });
})();
</script>
</body>
</html>
