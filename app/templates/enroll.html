<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Face Enrollment</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>


<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">

<div class="bg-white shadow-lg rounded-xl w-full max-w-xl p-8">

<!-- Title -->
<div class="text-center mb-6">
<h2 class="text-2xl font-semibold text-gray-800">
Face Enrollment
</h2>
<p class="text-gray-500 text-sm">
Register your face for secure identity verification
</p>
</div>


<!-- Camera -->
<div class="flex justify-center mb-6">

<div class="border rounded-lg overflow-hidden shadow">

<video
id="video"
autoplay
playsinline
muted
width="420"
height="300"
class="block"
></video>

</div>

</div>

<p class="text-center text-xs text-gray-500 mb-6">
Ensure your face is centered and clearly visible
</p>


<!-- Form -->
<div class="space-y-4">

<div>
<label class="text-sm text-gray-600 block mb-1">
Full Name
</label>

<input
type="text"
id="full_name"
placeholder="Enter your full name"
autocomplete="name"
class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
required
>

<div id="name-help" class="text-xs mt-1"></div>

</div>


<div>
<label class="text-sm text-gray-600 block mb-1">
Email Address
</label>

<input
type="email"
id="email"
placeholder="Enter your email"
autocomplete="email"
class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
required
>

<div id="email-help" class="text-xs mt-1"></div>

</div>


<button
id="enrollBtn"
class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 disabled:opacity-50"
disabled
>
Capture & Enroll
</button>

</div>


<!-- Status -->
<div id="status" class="text-sm text-center mt-4"></div>

<!-- Success Message (hidden by default) -->
<div id="successMessage" class="hidden mt-6 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg text-center">
    <p class="font-bold text-lg mb-2">✓ Enrollment Successful!</p>
    <p class="mb-4">Your face has been registered successfully.</p>
    <p class="text-sm">Redirecting to home page in <span id="countdown">3</span> seconds...</p>
</div>

<!-- Back -->
<div class="text-center mt-6">
<a href="/" class="text-sm text-indigo-600 hover:underline">
← Back to Home
</a>
</div>

</div>


<canvas id="canvas" style="display:none;" width="640" height="480"></canvas>


<script>
(async function() {
"use strict";

const fullNameInput = document.getElementById("full_name");
const emailInput = document.getElementById("email");
const enrollBtn = document.getElementById("enrollBtn");
const nameHelp = document.getElementById("name-help");
const emailHelp = document.getElementById("email-help");
const statusEl = document.getElementById("status");
const successMessage = document.getElementById("successMessage");
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function validateName() {
    const value = fullNameInput.value.trim();
    if (value.length < 3) {
        nameHelp.textContent = "Name must be at least 3 characters";
        nameHelp.className = "text-red-500";
        return false;
    }
    nameHelp.textContent = "Looks good";
    nameHelp.className = "text-green-600";
    return true;
}

function validateEmail() {
    const value = emailInput.value.trim();
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(value)) {
        emailHelp.textContent = "Enter a valid email address";
        emailHelp.className = "text-red-500";
        return false;
    }
    emailHelp.textContent = "Valid email";
    emailHelp.className = "text-green-600";
    return true;
}

function updateButtonState() {
    enrollBtn.disabled = !(validateName() && validateEmail());
}

fullNameInput.addEventListener("input", updateButtonState);
emailInput.addEventListener("input", updateButtonState);

function setStatus(text, className="") {
    statusEl.innerHTML = text;
    statusEl.className = className;
}

function showSuccessAndRedirect() {
    // Hide form and status
    document.querySelector('.space-y-4').style.display = 'none';
    statusEl.style.display = 'none';
    
    // Show success message
    successMessage.classList.remove('hidden');
    
    // Countdown and redirect
    let countdown = 3;
    const countdownEl = document.getElementById('countdown');
    
    const timer = setInterval(() => {
        countdown -= 1;
        countdownEl.textContent = countdown;
        
        if (countdown <= 0) {
            clearInterval(timer);
            window.location.href = "/";
        }
    }, 1000);
}

let stream = null;

try {
    stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user", width: {ideal:640}, height:{ideal:480} }
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    setStatus("Camera ready. Fill in your details.", "text-green-600");
    updateButtonState();
}
catch(err) {
    setStatus("Camera access denied.", "text-red-600");
    enrollBtn.disabled = true;
    return;
}


enrollBtn.addEventListener("click", async () => {
    if (!validateName() || !validateEmail()) {
        setStatus("Please correct the errors above.", "text-red-600");
        return;
    }

    setStatus("Capturing photo...", "text-gray-600");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = canvas.toDataURL("image/jpeg", 0.92).split(",")[1];

    const payload = {
        full_name: fullNameInput.value.trim(),
        email: emailInput.value.trim(),
        image: imageData
    };

    setStatus("Enrolling user...", "text-gray-600");

    try {
        const res = await fetch("/api/enroll", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (res.ok && data.status === "success") {
            // Show success message with redirect
            showSuccessAndRedirect();
        }
        else {
            setStatus("✗ " + (data.message || "Enrollment failed"), "text-red-600");
        }
    }
    catch(err) {
        setStatus("Network error – try again", "text-red-600");
    }
});

window.addEventListener("beforeunload", () => {
    if (stream) {
        stream.getTracks().forEach(t => t.stop());
    }
});

})();
</script>

</body>
</html>
